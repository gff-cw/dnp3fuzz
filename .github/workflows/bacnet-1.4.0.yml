name: bacnet-1.4.0 # 与实际文件名无关，在Actions页面展示名，硬编码

run-name: bacnet-1.4.0 fuzzing [${{ inputs.run_segment }}/${{ inputs.max_segments }}] on ${{ inputs.target_branch }}
# run-name: 任务运行时显示名，没法使用env，可以使用Github支持的全局变量
on:

  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to fuzz'
        required: true
        default: 'main'
        type: string

      run_segment:
        description: 'Current fuzzing segment number'
        required: true
        default: '1'
        type: string

      max_segments:
        description: 'Maximum number of chained fuzzing segments'
        required: true
        default: '16'
        type: string

      resume_run_id:
        description: 'Previous workflow run ID used for AFL resume'
        required: false
        default: ''
        type: string

      resume_artifact_name:
        description: 'Artifact name that contains previous AFL outputs'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: write
  issues: write

env:
  WORKFLOW_LABEL: bacnet-1.4.0
  TARGET_LABEL: bacnet-1.4.0
  MAIL_SUBJECT_PREFIX: "[AFL Alert]"

  FUZZ_DIR: bacnet-1.4.0
  TARGET_BIN: ./build
  AFL_FUZZ_PATH: ../afl-fuzz
  OUTPUT_DIR: outputs # 方便发邮件的引用变量
  LOG_DIR: logs

  RESULT_ARCHIVE_PREFIX: bacnet-1.4.0-findings # outputs打包压缩包前缀
  LOG_ARTIFACT_PREFIX: bacnet-1.4.0-log # bash命令输出文件前缀

  WORKFLOW_DISPATCH_FILE: bacnet-1.4.0.yml # 下一次运行的yml名
  DISPATCH_REF: main

  ALERT_GH_USER: gff-cw # 使用issue通知谁

jobs:
  fuzzing:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install runtime libraries for target and AFL++
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3.12 \
            libpython3.12t64 \
            libstdc++6 \
            libgcc-s1
          sudo ldconfig

      - name: Restore AFL++ state from previous segment
        if: ${{ inputs.resume_run_id != '' && inputs.resume_artifact_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          archive_file="${RESULT_ARCHIVE_PREFIX}.tar.gz"

          cd "${FUZZ_DIR}"
          rm -rf outputs
          mkdir -p /tmp/afl-resume

          gh run download "${{ inputs.resume_run_id }}" \
            -n "${{ inputs.resume_artifact_name }}" \
            -D /tmp/afl-resume

          tar -xzf "/tmp/afl-resume/${archive_file}"

          # 恢复后做一个最基本的目录检查
          test -d "outputs/out_m0/queue"

          echo "Resumed AFL++ output from run ${{ inputs.resume_run_id }} / artifact ${{ inputs.resume_artifact_name }}"

      - name: Check runtime libraries
        shell: bash
        run: |
          cd "${FUZZ_DIR}"

          chmod +x "${TARGET_BIN}" "${AFL_FUZZ_PATH}"

          echo "==== ldd afl-fuzz (${AFL_FUZZ_PATH}) ===="
          ldd "${AFL_FUZZ_PATH}" || true

          echo "==== ldd target binary (${TARGET_BIN}) ===="
          ldd "${TARGET_BIN}" || true

      - name: Prepare runner for crash detection
        shell: bash
        run: |
          echo "Before: $(cat /proc/sys/kernel/core_pattern)"
          sudo sysctl -w kernel.core_pattern=core
          echo "After:  $(cat /proc/sys/kernel/core_pattern)"

      - name: Run AFL++ fuzzing on multiple cores
        shell: bash
        run: |
          cd "${FUZZ_DIR}"
          mkdir -p "${LOG_DIR}"
          chmod +x "${TARGET_BIN}" "${AFL_FUZZ_PATH}"

          export AFL_NO_UI=1

          workers="$(nproc)"
          if [ "$workers" -lt 2 ]; then
            workers=2
          fi

          echo "Launching $workers AFL++ workers on the same VM"

          pids=()

          set +e

          timeout 21300 env \
            AFL_AUTORESUME=1 \
            AFL_IMPORT_FIRST=1 \
            AFL_TESTCACHE_SIZE=200 \
            "${AFL_FUZZ_PATH}" \
              -i inputs \
              -o outputs \
              -M out_m0 \
              -p explore \
              -P explore \
              -m none \
              -- "${TARGET_BIN}" @@ \
            > "logs/afl-fuzz-out_m0-seg-${{ inputs.run_segment }}.log" 2>&1 &
          pids+=($!)

          for i in $(seq 1 $((workers - 1))); do
            timeout 21300 env \
              AFL_AUTORESUME=1 \
              AFL_IMPORT_FIRST=1 \
              AFL_TESTCACHE_SIZE=200 \
              "${AFL_FUZZ_PATH}" \
                -i inputs \
                -o outputs \
                -S "out_s${i}" \
                -p explore \
                -P 300 \
                -m none \
                -- "${TARGET_BIN}" @@ \
              > "logs/afl-fuzz-out_s${i}-seg-${{ inputs.run_segment }}.log" 2>&1 &
            pids+=($!)
          done

          rc=0
          for pid in "${pids[@]}"; do
            wait "$pid"
            one_rc=$?
            echo "worker pid=$pid exit code=$one_rc"
            if [ "$one_rc" -ne 0 ] && [ "$one_rc" -ne 124 ]; then
              rc="$one_rc"
            fi
          done

          set -e

          if [ -f outputs/out_m0/plot_data ]; then
            echo "===== master plot_data tail ====="
            tail -n 20 outputs/out_m0/plot_data | tee "logs/plot_data_tail-seg-${{ inputs.run_segment }}.log"
          fi

          exit "$rc"

      - name: Print final fuzzer_stats for all workers
        if: always()
        shell: bash
        run: |
          cd "${FUZZ_DIR}"

          echo "===== final fuzzer_stats for all workers ====="
          found=0
          shopt -s nullglob

          for stats in "outputs"/out_*/fuzzer_stats; do
            found=1
            worker_dir="$(dirname "${stats}")"
            worker_name="$(basename "${worker_dir}")"

            echo "===== ${worker_name} ====="
            cat "${stats}"
            echo
          done

          if [ "${found}" -eq 0 ]; then
            echo "No outputs/out_*/fuzzer_stats found"
          fi

      - name: Alert GitHub user when crashes found
        continue-on-error: true
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_NO: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_GH_USER: ${{ env.ALERT_GH_USER }}
        run: |
          cd "${FUZZ_DIR}"

          shopt -s nullglob
          total_unique_crashes=0
          total_crashes=0
          found_stats=0
          summary_file="$(mktemp)"

          for stats in "${OUTPUT_DIR}"/out_*/fuzzer_stats; do
            found_stats=1
            worker_dir="$(dirname "${stats}")"
            worker_name="$(basename "${worker_dir}")"

            unique_crashes="$(awk -F': *' '$1=="unique_crashes"{print $2}' "${stats}" | tail -n1)"
            worker_total_crashes="$(awk -F': *' '$1=="total_crashes"{print $2}' "${stats}" | tail -n1)"

            unique_crashes="${unique_crashes:-0}"
            worker_total_crashes="${worker_total_crashes:-0}"

            total_unique_crashes=$((total_unique_crashes + unique_crashes))
            total_crashes=$((total_crashes + worker_total_crashes))

            crash_dir="${worker_dir}/crashes"
            if [ -d "${crash_dir}" ]; then
              crash_files_count="$(find "${crash_dir}" -maxdepth 1 -type f ! -name 'README.txt' | wc -l)"
            else
              crash_files_count=0
            fi

            {
              echo "${worker_name}:"
              echo "  unique_crashes=${unique_crashes}"
              echo "  total_crashes=${worker_total_crashes}"
              echo "  crash_files=${crash_files_count}"
              echo
            } >> "${summary_file}"
          done

          if [ "${found_stats}" -eq 0 ]; then
            echo "No ${OUTPUT_DIR}/out_*/fuzzer_stats found, skip GitHub alert"
            exit 0
          fi

          echo "Aggregated unique_crashes=${total_unique_crashes}"
          echo "Aggregated total_crashes=${total_crashes}"

          if [ "${total_unique_crashes}" -eq 0 ] && [ "${total_crashes}" -eq 0 ]; then
            echo "No crashes found across all workers, no GitHub notification"
            exit 0
          fi

          issue_title="${MAIL_SUBJECT_PREFIX} ${WORKFLOW_LABEL} #${RUN_NO} detected crashes"
          issue_body_file="$(mktemp)"

          {
            echo "@${ALERT_GH_USER}"
            echo
            echo "AFL crash detected."
            echo
            echo "- Workflow label: ${WORKFLOW_LABEL}"
            echo "- GitHub workflow: ${WORKFLOW_NAME}"
            echo "- Sequence: #${RUN_NO}"
            echo "- Target label: ${TARGET_LABEL}"
            echo "- Aggregated unique crashes: ${total_unique_crashes}"
            echo "- Aggregated total crashes: ${total_crashes}"
            echo "- Run URL: ${RUN_URL}"
            echo
            echo "Per-worker summary:"
            echo '```text'
            cat "${summary_file}"
            echo '```'
          } > "${issue_body_file}"

          export ISSUE_TITLE="${issue_title}"
          export ISSUE_BODY_FILE="${issue_body_file}"

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          import urllib.error

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          assignee = os.environ.get("ALERT_GH_USER", "").strip()
          title = os.environ["ISSUE_TITLE"]

          with open(os.environ["ISSUE_BODY_FILE"], "r", encoding="utf-8") as f:
              body = f.read()

          def create_issue(payload):
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues",
                  data=json.dumps(payload).encode("utf-8"),
                  method="POST",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json; charset=utf-8",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  print(f"Created GitHub issue for crash alert, status={resp.status}")

          payload = {
              "title": title,
              "body": body,
          }

          if assignee:
              payload["assignees"] = [assignee]

          try:
              create_issue(payload)
          except urllib.error.HTTPError as e:
              err = e.read().decode("utf-8", errors="replace")
              print(err, file=sys.stderr)

              # 某些仓库里用户不能被 assign，但 @mention 仍然可以用于通知
              if e.code == 422 and "assignees" in payload:
                  payload.pop("assignees", None)
                  create_issue(payload)
              else:
                  raise
          PY

      - name: Pack fuzzing results
        if: always()
        shell: bash
        run: |
          archive_file="${RESULT_ARCHIVE_PREFIX}.tar.gz"

          cd "${FUZZ_DIR}"

          if [ -d "outputs" ]; then
            tar -czf "${archive_file}" "outputs"
            echo "Packed archive: ${archive_file}"
          else
            echo "outputs not found, skip packing"
          fi

      - name: Upload fuzzing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LOG_ARTIFACT_PREFIX }}-seg-${{ inputs.run_segment }}
          path: ${{ env.FUZZ_DIR }}/${{ env.LOG_DIR }}/
          if-no-files-found: warn

      - name: Upload fuzzing results archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RESULT_ARCHIVE_PREFIX }}-seg-${{ inputs.run_segment }}
          path: ${{ env.FUZZ_DIR }}/${{ env.RESULT_ARCHIVE_PREFIX }}.tar.gz
          if-no-files-found: warn

      - name: Trigger next fuzzing segment
        if: ${{ success() && fromJSON(inputs.run_segment) < fromJSON(inputs.max_segments) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          next_segment=$(( ${{ inputs.run_segment }} + 1 ))
          current_artifact="${RESULT_ARCHIVE_PREFIX}-seg-${{ inputs.run_segment }}"

          echo "Trigger next segment: ${next_segment}"
          echo "Dispatch workflow file: ${WORKFLOW_DISPATCH_FILE}"
          echo "Dispatch ref: ${DISPATCH_REF}"

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_DISPATCH_FILE}/dispatches" \
            -d @- <<EOF
          {
            "ref": "${DISPATCH_REF}",
            "inputs": {
              "target_branch": "${{ inputs.target_branch }}",
              "run_segment": "${next_segment}",
              "max_segments": "${{ inputs.max_segments }}",
              "resume_run_id": "${{ github.run_id }}",
              "resume_artifact_name": "${current_artifact}"
            }
          }
          EOF
